<div style="display: flex; min-height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 9999; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #111111; margin: 0; padding: 0; overflow: hidden;">
  
    <div style="flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px; background-color: #111111; z-index: 2;">
      <div style="width: 100%; max-width: 360px;">
        
        <div style="text-align: center; margin-bottom: 50px;">
          <h1 style="color: #2ecc71; font-size: 48px; font-weight: 800; margin: 0; letter-spacing: 4px; text-shadow: 0 0 20px rgba(46,204,113,0.15);">
            QUANTIA
          </h1>
          <p style="color: #555; font-size: 12px; margin-top: 8px; text-transform: uppercase; letter-spacing: 3px; font-weight: 600;">
            Gestión Inmobiliaria
          </p>
        </div>
  
        <form #loginForm="ngForm" (ngSubmit)="onLogin()" style="display: flex; flex-direction: column; gap: 24px;">
          
          <div>
            <label style="color: #2ecc71; font-size: 11px; font-weight: 700; display: block; margin-bottom: 10px; letter-spacing: 1px;">CORREO ELECTRÓNICO</label>
            <input type="email" name="email" [(ngModel)]="credentials.email" required 
                   placeholder="admin@quantia.com"
                   style="width: 100%; padding: 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: white; outline: none; transition: all 0.3s ease; box-sizing: border-box;"
                   onfocus="this.style.borderColor='#2ecc71'; this.style.backgroundColor='#222'" 
                   onblur="this.style.borderColor='#333'; this.style.backgroundColor='#1a1a1a'">
          </div>
  
          <div>
            <label style="color: #2ecc71; font-size: 11px; font-weight: 700; display: block; margin-bottom: 10px; letter-spacing: 1px;">CONTRASEÑA</label>
            <input type="password" name="contrasena" [(ngModel)]="credentials.contrasena" required 
                   placeholder="••••••••"
                   style="width: 100%; padding: 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: white; outline: none; transition: all 0.3s ease; box-sizing: border-box;"
                   onfocus="this.style.borderColor='#2ecc71'; this.style.backgroundColor='#222'" 
                   onblur="this.style.borderColor='#333'; this.style.backgroundColor='#1a1a1a'">
          </div>
  
          <button type="submit" [disabled]="!loginForm.form.valid"
                  style="width: 100%; padding: 18px; background: #2ecc71; color: #000; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: all 0.3s ease; font-size: 14px; letter-spacing: 1px; box-shadow: 0 4px 15px rgba(46,204,113,0.2);"
                  onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 20px rgba(46,204,113,0.3)'"
                  onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 15px rgba(46,204,113,0.2)'">
            INGRESAR AL SISTEMA
          </button>
  
        </form>
  
        <div style="margin-top: 60px; text-align: center; border-top: 1px solid #222; padding-top: 20px;">
          <p style="color: #444; font-size: 11px; letter-spacing: 1px; margin: 0;">
            © 2026 QUANTIA PORTAL | FUSAGASUGÁ
          </p>
        </div>
        
      </div>
    </div>
  
    <div style="flex: 1.4; background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=2070'); background-size: cover; background-position: center;">
      <div style="width: 100%; height: 100%; background: linear-gradient(to right, #111111 0%, rgba(17,17,17,0.8) 20%, transparent 100%);"></div>
    </div>
  
  </div>
