<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px;">
  
    <div style="background: #111111; width: 100%; max-width: 400px; padding: 40px; border-radius: 12px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden;">
      
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #2ecc71, #27ae60);"></div>
  
      <div style="text-align: center; margin-bottom: 35px;">
        <h2 style="color: white; margin: 0; font-size: 28px; letter-spacing: -1px;">Crear Cuenta</h2>
        <p style="color: #666; font-size: 14px; margin-top: 10px;">Únete al portal de gestión <strong>Quantia</strong></p>
      </div>
  
      <form (ngSubmit)="onSubmit()" #registroForm="ngForm" style="display: flex; flex-direction: column; gap: 20px;">
        
        <div>
          <label style="display: block; color: #2ecc71; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Nombre Completo</label>
          <input type="text" 
                 name="nombre" 
                 [(ngModel)]="nuevoUsuario.nombre" 
                 required
                 placeholder="Juan Sebastian..." 
                 style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 14px; border-radius: 6px; color: white; outline: none; box-sizing: border-box;">
        </div>
  
        <div>
          <label style="display: block; color: #2ecc71; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Usuario o Email</label>
          <input type="email" 
                 name="email" 
                 [(ngModel)]="nuevoUsuario.email" 
                 required
                 placeholder="mail@quantia.com" 
                 style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 14px; border-radius: 6px; color: white; outline: none; box-sizing: border-box;">
        </div>
  
        <div>
          <label style="display: block; color: #2ecc71; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Contraseña</label>
          <input type="password" 
                 name="contrasena" 
                 [(ngModel)]="nuevoUsuario.contrasena" 
                 required
                 placeholder="••••••••" 
                 style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 14px; border-radius: 6px; color: white; outline: none; box-sizing: border-box;">
        </div>
  
        <button type="submit" 
                style="width: 100%; background: #2ecc71; color: #000; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 800; letter-spacing: 1px; transition: 0.3s; margin-top: 10px;"
                onmouseover="this.style.backgroundColor='#27ae60'" 
                onmouseout="this.style.backgroundColor='#2ecc71'">
          REGISTRARSE AHORA
        </button>
  
        <p style="color: #555; font-size: 13px; text-align: center; margin-top: 20px;">
          ¿Ya tienes cuenta? <a [routerLink]="['/login']" style="color: #2ecc71; text-decoration: none; font-weight: 700; cursor: pointer;">Inicia Sesión</a>
        </p>
      </form>
    </div>
  </div>
