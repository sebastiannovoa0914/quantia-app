<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px;">
  
    <div style="background: #111111; width: 100%; max-width: 500px; padding: 40px; border-radius: 12px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden;">
      
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #2ecc71, #27ae60);"></div>
  
      <div style="display: flex; align-items: center; gap: 25px; margin-bottom: 40px;">
        <div style="background: #1a1a1a; color: #2ecc71; width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 32px; font-weight: 800; border: 2px solid #2ecc71; box-shadow: 0 0 15px rgba(46,204,113,0.2);">
          {{ nombreUsuario.charAt(0) | uppercase }}
        </div>
        
        <div>
          <h1 style="margin: 0; font-size: 28px; color: white; letter-spacing: -0.5px;">¡Hola, <span style="color: #2ecc71;">{{ nombreUsuario }}</span>!</h1>
          <div style="display: inline-block; background: rgba(46,204,113,0.1); color: #2ecc71; padding: 4px 15px; border-radius: 4px; font-size: 11px; font-weight: 800; margin-top: 8px; text-transform: uppercase; letter-spacing: 2px; border: 1px solid rgba(46,204,113,0.2);">
            {{ rolUsuario }}
          </div>
        </div>
      </div>
  
      <div style="background: #161616; padding: 25px; border-radius: 8px; margin-bottom: 40px; border-left: 4px solid #2ecc71;">
        <h3 style="margin: 0 0 10px 0; color: #2ecc71; font-size: 16px; text-transform: uppercase; letter-spacing: 1px;">Acceso Autorizado</h3>
        <p style="margin: 0; color: #888; line-height: 1.6; font-size: 14px;">
          Bienvenido al núcleo de <strong>Quantia Portal</strong>. Tu terminal de gestión en Fusagasugá está lista y sincronizada.
        </p>
      </div>
  
      <div style="display: flex; flex-direction: column; gap: 15px;">
        
        <button *ngIf="rolUsuario === 'ADMINISTRADOR'" 
                [routerLink]="['/crear-propiedad']"
                style="width: 100%; background: #ffffff; color: #000; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 800; letter-spacing: 1px; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;"
                onmouseover="this.style.backgroundColor='#e0e0e0'" 
                onmouseout="this.style.backgroundColor='#ffffff'">
          <span>+</span> CREAR NUEVA PROPIEDAD
        </button>
  
        <button [routerLink]="['/lista-propiedades']"
                style="width: 100%; background: #2ecc71; color: #000; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 800; letter-spacing: 1px; transition: 0.3s;"
                onmouseover="this.style.backgroundColor='#27ae60'" 
                onmouseout="this.style.backgroundColor='#2ecc71'">
          EXPLORAR PROPIEDADES
        </button>
  
        <button (click)="logout()" 
                style="width: 100%; background: transparent; color: #555; border: 1px solid #333; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; margin-top: 10px;"
                onmouseover="this.style.color='#ff4d4d'; this.style.borderColor='#ff4d4d'" 
                onmouseout="this.style.color='#555'; this.style.borderColor='#333'">
          CERRAR SESIÓN SEGURA
        </button>
      </div>
  
    </div>
  </div>
