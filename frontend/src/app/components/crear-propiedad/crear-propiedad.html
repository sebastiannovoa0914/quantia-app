<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; font-family: 'Segoe UI', Roboto, sans-serif; padding: 20px;">
  
    <div style="background: #111111; width: 100%; max-width: 600px; padding: 40px; border-radius: 12px; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative;">
      
      <div style="position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, #ffffff, #2ecc71);"></div>
  
      <div style="margin-bottom: 30px;">
        <button [routerLink]="['/home']" style="background: transparent; border: none; color: #888; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; padding: 0;">
          ← Volver al Panel
        </button>
        <h2 style="color: white; margin: 20px 0 5px 0; font-size: 24px;">Registrar Propiedad</h2>
        <p style="color: #666; font-size: 14px; margin: 0;">Ingresa los detalles técnicos del nuevo inmueble en Fusagasugá.</p>
      </div>
  
      <form (ngSubmit)="guardar()" #propiedadForm="ngForm" style="display: flex; flex-direction: column; gap: 20px;">
        
        <div>
          <label style="display: block; color: #2ecc71; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px;">Título de la Propiedad</label>
          <input type="text" name="nombre" [(ngModel)]="proyecto.nombre" required placeholder="Ej: Lote San Jorge Sector A" 
                 style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 6px; color: white; outline: none;">
        </div>
  
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div>
            <label style="display: block; color: #2ecc71; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px;">Fecha Inicio</label>
            <input type="date" name="fecha_inicio" [(ngModel)]="proyecto.fecha_inicio" required
                   style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 6px; color: white; outline: none;">
          </div>
          <div>
            <label style="display: block; color: #2ecc71; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px;">Fecha Fin (esperada)</label>
            <input type="date" name="fecha_fin" [(ngModel)]="proyecto.fecha_fin" required
                   style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 6px; color: white; outline: none;">
          </div>
        </div>
  
        <div>
          <label style="display: block; color: #2ecc71; font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 8px;">Descripción Detallada</label>
          <textarea name="descripcion" [(ngModel)]="proyecto.descripcion" rows="4" 
                    style="width: 100%; background: #1a1a1a; border: 1px solid #333; padding: 12px; border-radius: 6px; color: white; outline: none; resize: none;"></textarea>
        </div>
  
        <button type="submit" [disabled]="!propiedadForm.form.valid"
                style="width: 100%; background: #2ecc71; color: #000; border: none; padding: 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 800; letter-spacing: 1px; margin-top: 10px; transition: 0.3s;"
                onmouseover="this.style.backgroundColor='#27ae60'" 
                onmouseout="this.style.backgroundColor='#2ecc71'">
          GUARDAR PROYECTO EN BASE DE DATOS
        </button>
  
      </form>
    </div>
  </div>
